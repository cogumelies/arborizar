<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soma</title>
</head>

<body>
    <h1>Soma Dois Números</h1>
    <script>
        //Programa para testar uso de variáveis e operador +
        var num1 = Number(prompt("Informe o primeiro número:"));
        var num2 = Number(prompt("Informe o segundo número:"));
        /* OBS: Se nas linhas 12 e 13, não for utilizado a instrução Number,
        o resultado do operador + será a concatenação das strings armazenadas
        em num1 e num2, ou seja, se o usuário digitar 123 e 456,
        o resultado armazenado na variável soma será a string "123456",
        ao invés do number 579. */
        var soma = num1 + num2;
        alert("A soma é: " + soma); //Exibe o resultado da soma para o usuário
    </script>
</body>

</html>
